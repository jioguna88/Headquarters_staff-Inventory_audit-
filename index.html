<style>

</style>

<body>

<h1>📦 다이클로 센터 실사재고조사</h1>

<div class="top-info">
  <div id="banner" class="banner loading">⏳ 로딩 중...</div>

  <div class="surveyor-row">

</div>

<div class="sticky-top">
  <div class="summary-bar">

    <div class="sum-match">일치<b id="sumMatch">0</b></div>

  <div class="dropdown">

<div class="main">

  <div class="dash-toggle" id="dashToggle">📊 전체 재고조사 현황 보기</div>
  <div class="dash-panel" id="dashPanel">
    <div class="dash-stats" style="grid-template-columns: repeat(4, 1fr);">
  <div>총품목<b id="dashTotal">0</b></div>
  <div style="color:#28a745">완료<b id="dashDone">0</b></div>
  <div style="color:#dc3545">미조사<b id="dashTodo">0</b></div>
  <div style="color:#fd7e14">재실사<b id="dashBigDiff">0</b></div>
</div>
  <div class="dash-filter">

  <button data-filter="bigdiff">⚠️ 재실사</button>

</div>
    <input type="text" id="dashSearch" placeholder="🔍 품목 검색" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:6px; margin-bottom:6px;">
    <div style="max-height:300px; overflow-y:auto;">
      <table class="dash-table">
        <thead><tr><th></th><th>품목</th><th>전산</th><th>입력</th></tr></thead>
        <tbody id="dashBody"></tbody>
      </table>
    </div>
    <button style="width:100%; margin-top:8px; padding:10px; background:#6c757d; color:#fff; border:none; border-radius:6px;" id="dashRefresh">🔄 새로고침</button>
  </div>
  
  <div id="itemsContainer"></div>
  
  <div class="submit-area">
  <div class="submit-hint">💡 <b>최종제출</b>: 시트에 확정 저장됩니다. 차이가 발생한 품목에는 메모(사유)를 반드시 입력하세요.</div>

</div>

    <h2 id="successTitle" style="color:#28a745">✅ 제출 완료</h2>
    <p id="successText"></p>

      <button data-k="0">0</button><button data-k=".">.</button><button class="eq" data-k="=">=</button><button class="op" data-k="+">+</button>

</div>

<div class="save-indicator" id="saveIndicator">💾 저장됨</div>

<script>
// ★★★ 이 한 줄만 본인 URL로 바꾸세요 ★★★
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyXhkpC3W7wnEicqCVeEDUKjO26buHxrHSnncZ-NtXk-J7wFErSl8XKDp8FqBFHHDya/exec';

const DRAFT_KEY = 'audit_draft_v3';
const MEMO_PRESETS = ['추가 재고 확인', '실사재고 입력'];

let SYS_PRODUCTS = [], EXTRA_PRODUCTS = [], DASHBOARD = {};
let items = [];
let dashFilter = 'all';
let calcTargetIdx = -1;
let lastSavedAt = null;
let calcExpr = '';

// ===== 안전한 DOM 헬퍼 =====
function $(id) { return document.getElementById(id); }
function safeText(id, text) { const el = $(id); if (el) el.textContent = text; }
function safeHTML(id, html) { const el = $(id); if (el) el.innerHTML = html; }
function safeClick(id, handler) { const el = $(id); if (el) el.onclick = handler; }
function safeShow(id) { const el = $(id); if (el) el.classList.add('show'); }
function safeHide(id) { const el = $(id); if (el) el.classList.remove('show'); }
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ===== 알림 표시 (절대 에러 안 남) =====
function showSuccess(title, htmlText) {
  try {
    const t = $('successTitle'), x = $('successText'), m = $('successModal');
    if (t && x && m) {
      t.textContent = title;
      x.innerHTML = htmlText;
      m.classList.add('show');
      return;
    }
  } catch (e) {}
  // 모달이 없으면 alert로 대체
  alert(title + '\n\n' + String(htmlText).replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]+>/g, ''));
}
function closeSuccess() { safeHide('successModal'); }

// ===== JSONP (데이터 로드용) =====
function jsonpRequest(url, timeout) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('타임아웃 (30초)')); }, timeout || 30000);
    function cleanup() {
      clearTimeout(timer);
      try { delete window[cb]; } catch(e) { window[cb] = undefined; }
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[cb] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('스크립트 로드 실패')); };
    const sep = url.indexOf('?') >= 0 ? '&' : '?';
    script.src = url + sep + 'callback=' + cb;
    document.body.appendChild(script);
  });
}

// ===== POST (안전 처리, 403 무시) =====
function postData(payload) {
  return new Promise((resolve) => {
    let done = false;
    let iframe = null, form = null;
    
    function finish() {
      if (done) return;
      done = true;
      setTimeout(() => {
        try { if (iframe && iframe.parentNode) iframe.parentNode.removeChild(iframe); } catch(e) {}
        try { if (form && form.parentNode) form.parentNode.removeChild(form); } catch(e) {}
      }, 200);
      resolve();  // 403/오류 상관없이 항상 성공 처리 (POST는 이미 전송됨)
    }
    
    try {
      const iframeName = 'pf_' + Date.now();
      iframe = document.createElement('iframe');
      iframe.name = iframeName;
      iframe.style.display = 'none';
      document.body.appendChild(iframe);
      
      form = document.createElement('form');
      form.method = 'POST';
      form.action = WEB_APP_URL;
      form.target = iframeName;
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = 'data';
      input.value = JSON.stringify(payload);
      form.appendChild(input);
      document.body.appendChild(form);
      
      iframe.onload = finish;
      iframe.onerror = finish;
      
      // 안전망: 6초 후 자동 완료 처리
      setTimeout(finish, 6000);
      
      form.submit();
    } catch (e) {
      console.error('POST 오류', e);
      finish();
    }
  });
}

// ===== 상품 로드 =====
async function loadProducts() {
  if (WEB_APP_URL.indexOf('여기에') >= 0 || WEB_APP_URL.indexOf('YOUR_') >= 0) {
    safeText('banner', '❌ WEB_APP_URL을 본인의 Apps Script URL로 변경하세요');
    const b = $('banner'); if (b) b.className = 'banner err';
    return;
  }
  try {
    const res = await jsonpRequest(WEB_APP_URL, 30000);
    if (!res || res.result !== 'success') throw new Error((res && res.message) || '응답 오류');
    SYS_PRODUCTS = res.products || [];
    EXTRA_PRODUCTS = res.extraProducts || [];
    const b = $('banner');
    if (b) {
      b.className = 'banner ok';
      b.textContent = '✅ 전산 ' + SYS_PRODUCTS.length + ' / 추가 ' + EXTRA_PRODUCTS.length + '개 로드';
    }
    const sb = $('submitBtn'); if (sb) sb.disabled = false;
    await loadDashboard();
    checkRestore();
  } catch (e) {
    const b = $('banner');
    if (b) { b.className = 'banner err'; b.textContent = '❌ ' + e.message; }
    checkRestore();
  }
}

// ===== 대시보드 로드 =====
async function loadDashboard() {
  try {
    const res = await jsonpRequest(WEB_APP_URL + '?action=dashboard', 20000);
    if (!res || res.result !== 'success') return;
    DASHBOARD = {};
    (res.dashboard || []).forEach(d => { DASHBOARD[d.name + '|' + d.spec] = d; });
    renderDashboard();
  } catch (e) { console.warn('대시보드 로드 실패', e); }
}

function renderDashboard() {
  const dsEl = $('dashSearch'), tbody = $('dashBody');
  if (!dsEl || !tbody) return;
  const search = dsEl.value.toLowerCase();
  tbody.innerHTML = '';
  let total = 0, done = 0, todo = 0;
  const rows = [];
  SYS_PRODUCTS.forEach(p => {
  const key = p.name + '|' + p.spec;
  const d = DASHBOARD[key];
  const totalQty = d ? d.totalQty : 0;
  const diff = totalQty - p.sysQty;
  const isBigDiff = totalQty > 0 && Math.abs(diff) > 10;  // ✅ 재실사 대상
  const isDone = totalQty > 0;
  total++;
  if (isDone) done++; else todo++;
  rows.push({
    status: isBigDiff ? 'bigdiff' : (isDone ? 'done' : 'todo'),
    isExtra: false, name: p.name, spec: p.spec,
    sysQty: p.sysQty, totalQty, diff, isBigDiff
  });
});
  Object.keys(DASHBOARD).forEach(key => {
    const d = DASHBOARD[key];
    if (d.type === '[전산재고 불확인]') {
      const inSys = SYS_PRODUCTS.some(p => (p.name + '|' + p.spec) === key);
      if (!inSys) rows.push({
        status: d.draftQty > 0 ? 'partial' : 'done',
        isExtra: true, name: d.name, spec: d.spec,
        sysQty: null, totalQty: d.totalQty, draftQty: d.draftQty
      });
    }
  });
  safeText('dashTotal', total);
  safeText('dashDone', done);
  safeText('dashTodo', todo);
  rows.filter(r => {
  if (dashFilter === 'todo' && r.status !== 'todo') return false;
  if (dashFilter === 'done' && r.status !== 'done') return false;
  if (dashFilter === 'bigdiff' && !r.isBigDiff) return false;  // ✅
  if (search && !(r.name + r.spec).toLowerCase().includes(search)) return false;
  return true;
}).forEach(r => {
  const tr = document.createElement('tr');
  if (r.isBigDiff) tr.className = 'dash-row-bigdiff';
  else if (r.status === 'done') tr.className = 'dash-row-done';
  else tr.className = 'dash-row-todo';
  const icon = r.isBigDiff ? '⚠️' : (r.status === 'done' ? '✅' : '🔴');
  const diffText = r.isBigDiff ? '<br><small style="color:#dc3545;font-weight:700;">차이 ' + (r.diff > 0 ? '+' : '') + r.diff + '</small>' : '';
  tr.innerHTML = '<td>' + icon + '</td><td>' + escapeHtml(r.name) + '<br><small>' + escapeHtml(r.spec) + '</small></td><td>' + (r.sysQty === null ? '-' : r.sysQty) + '</td><td><b>' + r.totalQty + '</b>' + diffText + '</td>';
  tbody.appendChild(tr);
});
}

// ===== 검색 =====
const searchInput = $('search');
const searchList = $('searchList');

function renderSearch() {
  if (!searchInput || !searchList) return;
  const q = searchInput.value.trim().toLowerCase();
 
 // ✅ 검색어가 비어있으면 드롭다운 숨김 (전체 노출 방지)
  if (!q) {
    searchList.classList.remove('show');
    searchList.innerHTML = '';
    return;
  }
 
  const combined = [];
  SYS_PRODUCTS.forEach(p => {
    const key = p.name + '|' + p.spec;
    const d = DASHBOARD[key];
    const surveyedQty = d ? d.totalQty : 0;
    const remain = Math.max(0, (p.sysQty || 0) - surveyedQty);
    let status = 'unsurveyed';
    if (d && d.draftQty > 0) status = 'partial';
    else if (surveyedQty >= p.sysQty && p.sysQty > 0) status = 'fully-surveyed';
    combined.push({ ...p, isExtra: false, surveyedQty, remain, status });
  });
  EXTRA_PRODUCTS.forEach(p => {
    const key = p.name + '|' + p.spec;
    const d = DASHBOARD[key];
    combined.push({ ...p, isExtra: true, surveyedQty: d ? d.totalQty : 0, remain: null, status: 'extra' });
  });
  const filtered = combined.filter(p => !q || (p.name + ' ' + p.spec).toLowerCase().includes(q));
  filtered.sort((a, b) => {
    const score = x => x.isExtra ? 3 : (x.status === 'fully-surveyed' ? 2 : (x.status === 'partial' ? 1 : 0));
    return score(a) - score(b);
  });
  const shown = filtered.slice(0, 200);
  searchList.innerHTML = '';
  if (shown.length === 0) {
    searchList.innerHTML = '<div class="dropdown-item">검색 결과 없음</div>';
  } else {
    shown.forEach(p => {
      const div = document.createElement('div');
      let cls = 'dropdown-item';
      if (p.isExtra) cls += ' extra-item';
      else if (p.status === 'fully-surveyed') cls += ' fully-surveyed';
      else if (p.status === 'partial') cls += ' partial';
      else cls += ' unsurveyed';
      div.className = cls;
      const extraLabel = p.isExtra ? '<span class="item-extra">[전산재고 불확인]</span> ' : '';
      let qtyInfo;
      if (p.isExtra) qtyInfo = '입력: <b>' + p.surveyedQty + '</b>';
      else {
        qtyInfo = '전산: <b>' + p.sysQty + '</b> / 입력: <b>' + p.surveyedQty + '</b> / 잔여: ';
        if (p.remain === 0) qtyInfo += '<span class="item-done">완료</span>';
        else qtyInfo += '<span class="item-remain">' + p.remain + '</span>';
      }
      div.innerHTML = '<div class="item-name">' + extraLabel + escapeHtml(p.name) + '</div><div class="item-meta">' + escapeHtml(p.spec) + ' / ' + escapeHtml(p.unit) + '<br>' + qtyInfo + '</div>';
      div.addEventListener('mousedown', e => {
        e.preventDefault();
        addItem(p);
        searchInput.value = '';
        searchList.classList.remove('show');
        searchInput.blur();
      });
      searchList.appendChild(div);
    });
  }
  searchList.classList.add('show');
}
if (searchInput) {
  searchInput.addEventListener('input', renderSearch);
  searchInput.addEventListener('blur', () => setTimeout(() => { if (searchList) searchList.classList.remove('show'); }, 200));
}

// ===== 규격 파싱 (계산기) =====
function parseSpec(spec) {
  if (!spec) return [];
  const presets = [];
  const s = String(spec).toUpperCase().replace(/\s/g, '');
  const re1 = /(\d+(?:\.\d+)?)([A-Z가-힣]+)=([A-Z가-힣]+)/g;
  let m;
  while ((m = re1.exec(s)) !== null) {
    presets.push({ label: '1' + m[3] + ' = ' + m[1] + m[2], multiplier: parseFloat(m[1]) });
  }
  const re2 = /(\d+)([A-Z가-힣]+)\(?(\d+)([A-Z가-힣]+)\)?\*(\d+)([A-Z가-힣]+)=([A-Z가-힣]+)/g;
  while ((m = re2.exec(s)) !== null) {
    const total = parseFloat(m[3]) * parseFloat(m[5]);
    presets.push({ label: '1' + m[7] + ' = ' + total + m[4], multiplier: total });
  }
  return presets;
}

// ===== 행 관리 =====
function addItem(p) {
  const existsIdx = items.findIndex(it => it.name === p.name && it.spec === p.spec);
  if (existsIdx >= 0) {
    items[existsIdx]._collapsed = false;
    renderItems();
    setTimeout(() => focusQtyInput(existsIdx), 80);
    return;
  }
  items.forEach(it => it._collapsed = true);
  items.unshift({
    name: p.name, spec: p.spec, unit: p.unit,
    sysQty: p.isExtra ? null : p.sysQty,
    type: p.isExtra ? '[전산재고 불확인]' : '전산재고',
    actualQty: 0, memo: '', expiry: '',
    _collapsed: false, _new: true, _draftSubmitted: false
  });
  renderItems();
  setTimeout(() => focusQtyInput(0), 80);
  saveLocal(true);
}

function focusQtyInput(idx) {
  const row = document.querySelector('[data-idx="' + idx + '"]');
  if (!row) return;
  row.scrollIntoView({ behavior: 'smooth', block: 'start' });
  const qty = row.querySelector('.qty-input-big');
  if (qty) { qty.focus(); try { qty.select(); } catch(e) {} }
}

function removeItem(idx) { items.splice(idx, 1); renderItems(); saveLocal(true); }
function changeQty(idx, delta) {
  items[idx].actualQty = Math.max(0, Math.round(((items[idx].actualQty || 0) + delta) * 100) / 100);
  renderItems(); saveLocal();
}
function setQty(idx, val) {
  items[idx].actualQty = Math.max(0, parseFloat(val) || 0);
  renderItems(); saveLocal();
}
function setMatch(idx) {
  if (items[idx].sysQty !== null) {
    items[idx].actualQty = items[idx].sysQty;
    renderItems(); saveLocal(true);
  }
}
function setMemo(idx, val) {
  items[idx].memo = val;
  // ✅ 전체 리렌더 대신 메모 영역 스타일만 부분 업데이트
  const row = document.querySelector('[data-idx="' + idx + '"]');
  if (row) {
    const memoArea = row.querySelector('.memo-area');
    if (memoArea) {
      const empty = !val || !val.trim();
      const required = needsMemo(items[idx]);
      if (required && empty) memoArea.classList.add('required-empty');
      else memoArea.classList.remove('required-empty');
    }
  }
  saveLocal();
}
function setExpiry(idx, val) { items[idx].expiry = val; saveLocal(); }
function toggleCollapse(idx) { items[idx]._collapsed = !items[idx]._collapsed; renderItems(); }
function needsMemo(it) { if (it.sysQty === null) return false; return it.actualQty !== it.sysQty; }

function renderItems() {
  const c = $('itemsContainer');
  if (!c) return;
  c.innerHTML = '';
  let match = 0, over = 0, short = 0;
  
  items.forEach((it, idx) => {
    const div = document.createElement('div');
    let rowCls = 'item-row';
    if (it.type === '[전산재고 불확인]') rowCls += ' extra';
    if (it._draftSubmitted) rowCls += ' draft';
    if (it._collapsed) rowCls += ' collapsed';
    if (it._new) rowCls += ' new';
    div.className = rowCls;
    div.setAttribute('data-idx', idx);
    if (it._new) setTimeout(() => { it._new = false; }, 1500);
    
    let diffHtml = '';
    if (it.sysQty === null) {
      diffHtml = '<div class="diff-box diff-na">📌 전산재고 미등록 (차이 산정 불가)</div>';
    } else {
  // 다른 조사자가 이미 입력한 누적 수량 (DASHBOARD에서 가져옴)
  const dashKey = it.name + '|' + it.spec;
  const dashInfo = DASHBOARD[dashKey];
  const otherSurveyed = dashInfo ? (dashInfo.totalQty || 0) : 0;
  
  // 합산 = 다른 조사자 누적 + 내가 지금 입력한 값
  const totalCounted = otherSurveyed + it.actualQty;
  const diff = totalCounted - it.sysQty;  // ✅ 누적 반영된 차이
  const myDiff = it.actualQty - it.sysQty;  // 내 입력만의 차이 (메모 검증용)
  const bigDiffWarn = Math.abs(diff) > 10 ? ' <span style="color:#dc3545;font-weight:700;">[재실사 검토]</span>' : '';
  
  if (it.actualQty === 0 && otherSurveyed === 0) {
    diffHtml = '<div class="diff-box diff-na">실사수량 입력 필요 (남은 수량: ' + it.sysQty + ')</div>';
  } else if (diff === 0) {
    diffHtml = '<div class="diff-box diff-match">✅ 일치 (누적 ' + totalCounted + ' / 전산 ' + it.sysQty + ')</div>';
    match++;
  } else if (diff > 0) {
    diffHtml = '<div class="diff-box diff-over">📈 초과 +' + diff + ' (누적 ' + totalCounted + ' / 전산 ' + it.sysQty + ')' + bigDiffWarn + '</div>';
    over++;
  } else {
    // ✅ 핵심: 부족일 때 "앞으로 더 찾아야 할 수량" 명확히 표시
    diffHtml = '<div class="diff-box diff-short">📉 부족 ' + diff + ' (누적 ' + totalCounted + ' / 전산 ' + it.sysQty + ')<br><small>👉 추가로 찾아야 할 수량: <b>' + Math.abs(diff) + '개</b></small>' + bigDiffWarn + '</div>';
    short++;
  }
}
    
    const typeTag = it.type === '[전산재고 불확인]' ? '<span class="type-tag">불확인</span>' : '';
    const draftTag = it._draftSubmitted ? '<span class="draft-tag">임시저장됨</span>' : '';
    const sysQtyText = it.sysQty === null ? '미등록' : it.sysQty;
    const matchBtn = it.sysQty !== null ? '<button class="quick-btn match" data-act="match">✓ 전산일치 (' + it.sysQty + ')</button>' : '<button class="quick-btn match" disabled style="opacity:0.5">일치(불가)</button>';
    
    const dashKey = it.name + '|' + it.spec;
    const dashInfo = DASHBOARD[dashKey];
    let otherInfo = '';
    if (dashInfo && dashInfo.totalQty > 0) {
      otherInfo = ' / 누적입력: <span class="other-qty">' + dashInfo.totalQty + '</span>';
    }
    
    const memoRequired = needsMemo(it);
    const memoEmpty = !it.memo || !it.memo.trim();
    const memoLabelCls = memoRequired ? 'memo-label required' : 'memo-label';
    const memoAreaCls = (memoRequired && memoEmpty) ? 'memo-area required-empty' : 'memo-area';
    
    let presetBtns = '';
    MEMO_PRESETS.forEach(preset => {
      const active = (it.memo || '').indexOf(preset) >= 0 ? ' active' : '';
      presetBtns += '<button class="memo-preset-btn' + active + '" data-preset="' + escapeHtml(preset) + '">' + escapeHtml(preset) + '</button>';
    });
    
    div.innerHTML =
      '<div class="row-title">' + typeTag + draftTag + escapeHtml(it.name) + '</div>' +

      '<div class="qty-big-row">' +
        '<button class="qty-btn-big" data-act="minus">−</button>' +
        '<input type="number" inputmode="decimal" class="qty-input-big" value="' + it.actualQty + '" min="0">' +
        '<button class="qty-btn-big" data-act="plus">+</button>' +
      '</div>' +
      '<div class="quick-btns">' +
        matchBtn +
        '<button class="quick-btn calc" data-act="calc">🧮 계산기</button>' +
        '<button class="quick-btn zero" data-act="zero">0으로</button>' +
      '</div>' +
      '<div class="quick-btns" style="grid-template-columns:repeat(4,1fr);">' +
        '<button class="quick-btn" data-act="p1">+1</button>' +
        '<button class="quick-btn" data-act="p5">+5</button>' +
        '<button class="quick-btn" data-act="p10">+10</button>' +
        '<button class="quick-btn" data-act="p100">+100</button>' +

      diffHtml +

        '<div class="' + memoLabelCls + '">📝 메모' + (memoRequired ? ' (차이 발생 시 필수)' : '') + '</div>' +
        '<div class="memo-presets">' + presetBtns + '</div>' +

      '</div>' +

        '<label>📅 유통기한</label>' +

      '</div>';

      btn.onclick = (e) => {

        else if (a === 'plus') changeQty(idx, +1);
        else if (a === 'p1') changeQty(idx, +1);
        else if (a === 'p5') changeQty(idx, +5);
        else if (a === 'p10') changeQty(idx, +10);
        else if (a === 'p100') changeQty(idx, +100);
        else if (a === 'zero') setQty(idx, 0);
        else if (a === 'match') setMatch(idx);
        else if (a === 'calc') openCalc(idx);
        else if (a === 'collapse') toggleCollapse(idx);
        else if (a === 'remove') { if (confirm('삭제하시겠습니까?')) removeItem(idx); }
      };

      else b.classList.remove('active');
    });
    // 메모 검증 스타일도 업데이트
    if (memoArea) {
      const empty = !newMemo || !newMemo.trim();
      const required = needsMemo(items[idx]);

      else memoArea.classList.remove('required-empty');
    }

  };
});
    
    const qtyInput = div.querySelector('.qty-input-big');

    if (expEl) expEl.oninput = (e) => setExpiry(idx, e.target.value);

  });
  
  safeText('sumTotal', items.length);
  safeText('sumMatch', match);
  safeText('sumOver', over);
  safeText('sumShort', short);
  safeText('btnCount', items.length);
  safeText('draftCount', items.length);
}

// ===== 계산기 =====
function openCalc(idx) {
  calcTargetIdx = idx; calcExpr = '';
  const it = items[idx];
  safeHTML('calcContext', '<b>' + escapeHtml(it.name) + '</b><br>규격: ' + escapeHtml(it.spec) + ' / 단위: ' + escapeHtml(it.unit));
  const presetsDiv = $('calcPresets');
  if (presetsDiv) {
    presetsDiv.innerHTML = '';
    const presets = parseSpec(it.spec);
    presets.forEach(p => {
      const b = document.createElement('button');
      b.className = 'calc-preset-btn';
      b.innerHTML = '💡 ' + p.label + '<br><small>× ' + p.multiplier + ' 적용</small>';
      b.onclick = () => {
        if (calcExpr === '' || /[+\-*/(]$/.test(calcExpr)) calcExpr += p.multiplier;
        else calcExpr += '*' + p.multiplier;
        updateCalcDisplay();
      };
      presetsDiv.appendChild(b);
    });
    if (presets.length === 0) {
      presetsDiv.innerHTML = '<div style="grid-column:span 2; padding:8px; background:#f8f9fa; border-radius:6px; font-size:12px; color:#666; text-align:center;">규격에서 환산을 추출하지 못했습니다.<br>아래 계산기로 직접 입력하세요.</div>';
    }
  }
  updateCalcDisplay();
  safeShow('calcModal');
}
function closeCalc() { safeHide('calcModal'); }
function updateCalcDisplay() {
  safeText('calcFormula', calcExpr.replace(/\*/g, '×').replace(/\//g, '÷') || '\u00A0');
  let result = 0;
  try {
    if (calcExpr && /^[\d+\-*/.()  ]+$/.test(calcExpr)) {
      result = Function('"use strict"; return (' + calcExpr + ')')();
      if (!isFinite(result) || isNaN(result)) result = 0;
    }
  } catch (e) { result = 0; }
  const r = $('calcResult');
  if (r) {
    r.textContent = (Math.round(result * 100) / 100).toLocaleString('ko-KR');
    r.dataset.value = result;
  }
}
document.querySelectorAll('.calc-grid button').forEach(btn => {
  btn.onclick = () => {
    const k = btn.dataset.k;
    if (k === 'C') calcExpr = '';
    else if (k === '←') calcExpr = calcExpr.slice(0, -1);
    else if (k === '=') {
      updateCalcDisplay();
      const r = $('calcResult');
      calcExpr = String(parseFloat((r && r.dataset.value) || '0'));
    }
    else calcExpr += k;
    updateCalcDisplay();
  };
});
safeClick('calcApply', () => {
  updateCalcDisplay();
  const r = $('calcResult');
  const val = parseFloat((r && r.dataset.value) || '0');
  if (calcTargetIdx >= 0) setQty(calcTargetIdx, val);
  closeCalc();
});
safeClick('calcCloseBtn', closeCalc);

// ===== 모달 버튼 =====
safeClick('successCloseBtn', closeSuccess);
safeClick('successResetBtn', () => {
  closeSuccess();
  items = []; renderItems(); loadDashboard();
  updateSaveStatus('cleared');
});

// ===== 최종제출 =====
let submitted = false;  // ✅ 중복 제출 방지 플래그

safeClick('submitBtn', async () => {
  if (submitted) {
    alert('이미 제출 완료되었습니다.\n새로 작성하려면 페이지를 새로고침(F5) 해주세요.');
    return;
  }
  const sv = $('surveyor');
  const surveyor = sv ? sv.value.trim() : '';
  if (!surveyor) { alert('조사자 이름을 입력하세요.'); return; }
  if (items.length === 0) { alert('품목을 1개 이상 추가하세요.'); return; }
  
  const noMemo = items.filter(it => needsMemo(it) && (!it.memo || !it.memo.trim()));
  if (noMemo.length > 0) {
    alert('차이가 발생한 ' + noMemo.length + '개 품목에 메모(사유)가 비어 있습니다.\n메모를 입력해주세요.');
    const idx = items.indexOf(noMemo[0]);
    items[idx]._collapsed = false;
    renderItems();
    setTimeout(() => {
      const el = document.querySelector('[data-idx="' + idx + '"] .memo-area');
      if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.focus(); }
    }, 100);
    return;
  }
  
  // ✅ 재실사 필요 품목 경고 (차이 절대값 > 10)
  const bigDiff = items.filter(it => {
    if (it.sysQty === null) return false;
    return Math.abs(it.actualQty - it.sysQty) > 10;
  });
  let confirmMsg = '최종제출 하시겠습니까?\n시트에 확정 저장됩니다.';
  if (bigDiff.length > 0) {
    confirmMsg = '⚠️ 차이가 10개를 초과한 품목이 ' + bigDiff.length + '개 있습니다.\n(재실사가 필요할 수 있는 품목)\n\n' +
                 bigDiff.slice(0, 5).map(it => '• ' + it.name + ' (차이 ' + (it.actualQty - it.sysQty) + ')').join('\n') +
                 (bigDiff.length > 5 ? '\n...외 ' + (bigDiff.length - 5) + '개' : '') +
                 '\n\n그래도 제출하시겠습니까?';
  }
  if (!confirm(confirmMsg)) return;
  
  const btn = $('submitBtn');
  if (btn) { btn.disabled = true; btn.textContent = '제출 중...'; }
  
  try {
    await postData({ mode: 'final', surveyor, items });
    submitted = true;  // ✅ 제출 완료 표시
    showSuccess('✅ 최종제출 완료', 
      items.length + '개 품목이 실사결과 시트에 저장되었습니다.' +
      (bigDiff.length > 0 ? '<br><br>⚠️ 차이 10개 초과 품목 ' + bigDiff.length + '개는 재실사 검토 권장' : '') +
      '<br><br>새로 작성하려면 <b>페이지 새로고침(F5)</b> 해주세요.'
    );
    try { localStorage.removeItem(DRAFT_KEY); } catch(e) {}
    setTimeout(loadDashboard, 1500);
    // 제출 버튼 영구 비활성화
    if (btn) { btn.textContent = '✅ 제출 완료 (새로고침 필요)'; btn.disabled = true; }
  } catch (e) {
    showSuccess('⚠️ 제출 전송됨', '서버 응답 확인 불가하지만 데이터는 전송되었습니다.<br>시트에서 확인해 주세요.');
    if (btn) { btn.disabled = false; btn.textContent = '📤 최종제출 (' + items.length + '개)'; }
  }
});

// ===== 자동 저장 =====
let saveDebounce;
function saveLocal(immediate) {
  clearTimeout(saveDebounce);
  const doSave = () => {
    try {
      const sv = $('surveyor');
      const surveyor = sv ? sv.value : '';
      localStorage.setItem(DRAFT_KEY, JSON.stringify({ surveyor, items, ts: Date.now() }));
      lastSavedAt = new Date();
      updateSaveStatus('saved');
      const ind = $('saveIndicator');
      if (ind) {
        ind.classList.add('show');
        clearTimeout(ind._t);
        ind._t = setTimeout(() => ind.classList.remove('show'), 1200);
      }
    } catch (e) { updateSaveStatus('error'); }
  };
  if (immediate) doSave();
  else { updateSaveStatus('saving'); saveDebounce = setTimeout(doSave, 400); }
}

function updateSaveStatus(state) {
  const el = $('saveStatus'), txt = $('saveStatusText'), time = $('saveStatusTime');
  if (!el || !txt) return;
  el.className = 'save-status';
  if (state === 'saving') { el.classList.add('saving'); txt.textContent = '💾 저장 중...'; }
  else if (state === 'saved') { el.classList.add('saved'); txt.textContent = '✅ 자동 저장됨'; }
  else if (state === 'error') { txt.textContent = '⚠️ 저장 오류'; }
  else if (state === 'cleared') { txt.textContent = '💾 자동 저장: 대기 중'; if (time) time.textContent = ''; return; }
  else { txt.textContent = '💾 자동 저장: 대기 중'; }
  if (lastSavedAt && time) time.textContent = '마지막: ' + lastSavedAt.toLocaleTimeString('ko-KR');
}

const surveyorEl = $('surveyor');
if (surveyorEl) surveyorEl.addEventListener('input', () => saveLocal());

window.addEventListener('beforeunload', () => {
  try {
    const sv = $('surveyor');
    const surveyor = sv ? sv.value : '';
    if (items.length > 0 || surveyor) localStorage.setItem(DRAFT_KEY, JSON.stringify({ surveyor, items, ts: Date.now() }));
  } catch (e) {}
});
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') {
    try {
      const sv = $('surveyor');
      const surveyor = sv ? sv.value : '';
      if (items.length > 0 || surveyor) localStorage.setItem(DRAFT_KEY, JSON.stringify({ surveyor, items, ts: Date.now() }));
    } catch (e) {}
  }
});
setInterval(() => { if (items.length > 0) saveLocal(true); }, 5000);
setInterval(() => { const p = $('dashPanel'); if (p && p.classList.contains('show')) loadDashboard(); }, 15000);

// ===== 복원 =====
function checkRestore() {
  let raw;
  try { raw = localStorage.getItem(DRAFT_KEY); } catch(e) { return; }
  if (!raw) return;
  try {
    const d = JSON.parse(raw);
    if ((!d.items || d.items.length === 0) && !d.surveyor) {
      try { localStorage.removeItem(DRAFT_KEY); } catch(e) {}
      return;
    }
    const savedDate = new Date(d.ts);
    const minutesAgo = Math.floor((Date.now() - d.ts) / 60000);
    let timeStr;
    if (minutesAgo < 1) timeStr = '방금 전';
    else if (minutesAgo < 60) timeStr = minutesAgo + '분 전';
    else if (minutesAgo < 1440) timeStr = Math.floor(minutesAgo / 60) + '시간 전';
    else timeStr = Math.floor(minutesAgo / 1440) + '일 전';
    const area = $('restoreArea');
    if (!area) return;
    area.innerHTML = 
      '<div class="restore-banner">' +
      '<h3>💾 이전 입력 데이터가 있습니다</h3>' +
      '<div class="info">저장 시각: ' + savedDate.toLocaleString('ko-KR') + ' (' + timeStr + ')<br>조사자: <b>' + escapeHtml(d.surveyor || '미입력') + '</b><br>품목 수: <b>' + (d.items ? d.items.length : 0) + '개</b></div>' +
      '<div class="btn-row"><button class="btn-restore" id="btnRestore">📂 이어서 작업</button><button class="btn-discard" id="btnDiscard">🗑️ 새로 시작</button></div>' +
      '</div>';
    safeClick('btnRestore', () => {
      const sv = $('surveyor');
      if (sv) sv.value = d.surveyor || '';
      items = (d.items || []).map((it, i) => ({ ...it, _collapsed: i !== 0, _new: false }));
      renderItems();
      lastSavedAt = savedDate;
      updateSaveStatus('saved');
      area.innerHTML = '';
    });
    safeClick('btnDiscard', () => {
      if (confirm('이전 입력을 삭제할까요? 복구 불가합니다.')) {
        try { localStorage.removeItem(DRAFT_KEY); } catch(e) {}
        area.innerHTML = '';
        updateSaveStatus('cleared');
      }
    });
  } catch (e) {}
}

// ===== 대시보드 토글 =====
safeClick('dashToggle', () => {
  const p = $('dashPanel');
  if (!p) return;
  p.classList.toggle('show');
  safeText('dashToggle', p.classList.contains('show') ? '📊 현황 닫기' : '📊 전체 재고조사 현황 보기');
  if (p.classList.contains('show')) loadDashboard();
});
safeClick('dashRefresh', loadDashboard);
const dsEl = $('dashSearch');
if (dsEl) dsEl.addEventListener('input', renderDashboard);
document.querySelectorAll('.dash-filter button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.dash-filter button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    dashFilter = btn.dataset.filter;
    renderDashboard();
  };
});

// ===== 시작 =====
loadProducts();
updateSaveStatus('idle');
</script>
